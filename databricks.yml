name: mahi_ingestion

workspace:
  host: ${DATABRICKS_HOST}
resources:
  pipelines:
    postgresql_ingestion:
      name: mahi_postgresql_ingestion
      catalog: ingest_framework
      schema: bronze
      # Mandated for Free/Community Edition Serverless runtime
      serverless: true 
      
      ingestion_definition:
        connection_name: mahi_postgresql
        source_type: POSTGRESQL
        objects:
        - table:
            source_catalog: neondb
            source_schema: public
            source_table: orders
            destination_catalog: ingest_framework
            destination_schema: postgresql_ingestion
            destination_table: orders
            # Empty table_configuration forces Lakeflow Connect to perform a FULL LOAD
            table_configuration: {}
            
        - table:
            source_catalog: neondb
            source_schema: public
            source_table: customers
            destination_catalog: ingest_framework
            destination_schema: postgresql_ingestion
            destination_table: customers
            # Empty table_configuration forces Lakeflow Connect to perform a FULL LOAD
            table_configuration: {}

  jobs:
    postgresql_refresh:
      name: mahi_postgresql_refresh
      trigger:
        periodic:
          interval: 1
          unit: DAYS
      tasks:
      - task_key: refresh
        pipeline_task:
          pipeline_id: ${resources.pipelines.postgresql_ingestion.id}
