bundle:
  name: boopathi_postgresql_ingestion
workspace:
  host: https://dbc-ce0ce842-10b5.cloud.databricks.com
resources:
  pipelines:
    postgresql_gateway:
      name: boopathi_postgresql_gateway
      catalog: ingest_framework
      schema: bronze
      gateway_definition:
        connection_name: boopathi_postgresql
        gateway_storage_catalog: ingest_framework
        gateway_storage_schema: bronze
        gateway_storage_name: postgresql_gateway
    postgresql_ingestion:
      name: boopathi_postgresql_ingestion
      catalog: ingest_framework
      schema: bronze
      ingestion_definition:
        ingestion_gateway_id: ${resources.pipelines.postgresql_gateway.id}
        source_type: POSTGRESQL
        objects:
        - table:
            destination_catalog: ingest_framework
            destination_schema: postgresql_ingestion
            destination_table: orders
            source_schema: public
            source_table: orders
            source_catalog: neondb
        - table:
            destination_catalog: ingest_framework
            destination_schema: postgresql_ingestion
            destination_table: customers
            source_schema: public
            source_table: customers
            source_catalog: neondb
        source_configurations:
        - catalog:
            source_catalog: neondb
            postgres:
              slot_config:
                slot_name: databricks_slot
                publication_name: databricks_publication
  jobs:
    postgresql_refresh:
      name: boopathi_postgresql_refresh
      trigger:
        periodic:
          interval: 1
          unit: DAYS
      tasks:
      - task_key: refresh
        pipeline_task:
          pipeline_id: ${resources.pipelines.postgresql_ingestion.id}
