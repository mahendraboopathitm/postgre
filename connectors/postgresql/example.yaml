customer:
  name: "customer_a"
  workspace_url: "https://adb-123456789.0.azuredatabricks.net"
  catalog: "customer_a_catalog"
  schema: "postgresql_ingestion"
  secret_scope: "customer_a_secrets"

connectors:
  - name: "postgresql"
    connection_name: "customer_a_postgresql"
    kind: "official"
    auth_mode: "automated"
    connection_type: "POSTGRESQL"
    source_type: "POSTGRESQL"
    gateway: true
    connection_options:
      host: "<direct, non-pooled db host>"
      port: "5432"
      database: "<db_name>"
    source_configuration:
      slot_name: "databricks_slot"
      publication_name: "databricks_publication"
    tables:
      - source_schema: "public"
        source_table: "orders"
        destination_schema: "postgresql_ingestion"
      - source_schema: "public"
        source_table: "customers"
        destination_schema: "postgresql_ingestion"
