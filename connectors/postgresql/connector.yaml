name: postgresql
version: 1.0.0
kind: official
description: "Ingests PostgreSQL tables via change data capture (logical replication) into Unity Catalog, using Databricks' first-party Lakeflow Connect PostgreSQL connector - not a cloned community repo."
auth_mode: automated
connection_type: POSTGRESQL
source_type: POSTGRESQL
gateway: true
required_config:
  connection_name: "Name for the Unity Catalog connection this framework will create/update automatically. No manual authorization step - see README.md."
connection_options:
  # Plain (non-secret) fields - set directly in deployment.yaml.
  - host
  - port
  - database
  - sslmode  # optional, e.g. "require" for providers (Neon, RDS) that mandate SSL
env_credentials:
  # Real values, never written to deployment.yaml or a Databricks secret
  # scope - this script resolves them straight from .env as
  # POSTGRESQL_<FIELD>_<CUSTOMER> (see README.md and _resolve_env_credentials
  # in scripts/deploy.py). A Databricks secret scope can't be dereferenced
  # from here: dbutils.secrets.get() only works inside a running
  # notebook/job, and this connector has no notebook.
  - user
  - password
source_configuration_fields:
  - slot_name
  - publication_name
available_tables:
  - name: "(any table)"
    description: "Any table/schema visible to the replication user, selected per-deployment under 'tables' in deployment.yaml (source_schema, source_table, destination_schema)."
